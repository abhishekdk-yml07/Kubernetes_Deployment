# Production overlay — mirrors values-prod.yaml but for kustomize workflow
global:
  environment: production

api:
  replicaCount: 5
  autoscaling:
    minReplicas: 5
    maxReplicas: 50

worker:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 20

networkPolicy:
  enabled: true
